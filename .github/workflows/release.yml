name: Release

# Push a release-* tag (e.g. `git tag release-2026-06 && git push origin release-2026-06`)
# to build the update artifacts and publish them as GitHub release assets.
on:
  push:
    tags:
      - 'release-*'

permissions:
  contents: write   # required for `gh release create`

jobs:
  release:
    # Must be Windows: the bundled JRE is built with jlink, which produces a
    # runtime for the OS it runs on, and the launcher only runs on Windows.
    runs-on: windows-latest
    steps:
      # v5 of these actions runs on Node 24 (v4 used the now-deprecated Node 20).
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # `verify` runs package (thin jar + lib/) then antrun, producing
      # target/apronterm.zip (apronterm.jar + lib/ + version.xml + java/ JRE) and target/update.xml.
      - name: Build update artifacts
        run: mvn -B -DskipTests clean verify

      # Publish a normal (non-prerelease) release so that
      #   https://github.com/${{ github.repository }}/releases/latest/download/update.xml
      #   https://github.com/${{ github.repository }}/releases/latest/download/apronterm.zip
      # are stable URLs the launcher can point at, regardless of the tag name.
      # Idempotent: if the tag is re-pushed (or this run is re-run), update the
      # existing release's assets instead of failing on "release already exists".
      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              target/apronterm.zip \
              target/update.xml \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              target/apronterm.zip \
              target/update.xml
          fi
